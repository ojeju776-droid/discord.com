<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Błąd połączenia</title>
    <style>
        /* Styl neutralnej, nowoczesnej strony błędu */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1e1f22;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .error-card {
            background-color: #2b2d31;
            width: 400px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: #f2f3f5;
            font-size: 22px;
            margin: 0 0 10px 0;
        }

        p {
            color: #b5bac1;
            font-size: 15px;
            line-height: 1.4;
            margin: 0 0 20px 0;
        }

        .footer-text {
            color: #949ba4;
            font-size: 13px;
            margin: 0;
        }

        /* Ukryty przycisk na pierwszej trójce */
        .secret-trigger {
            color: #949ba4;
            cursor: default;
            user-select: none;
        }

        /* Styl panelu IP (domyślnie ukryty) */
        #admin-panel {
            display: none;
            background-color: #111214;
            width: 440px;
            padding: 20px;
            border-radius: 8px;
            color: #23a55a;
            font-family: monospace;
            text-align: left;
        }

        #admin-panel h2 {
            margin-top: 0;
            border-bottom: 1px solid #23a55a;
            padding-bottom: 8px;
            font-size: 18px;
        }

        ul {
            padding-left: 20px;
            color: #dbdee1;
        }

        .btn-back {
            background-color: #23a55a;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="error-page" class="error-card">
        <h1>Wystąpił błąd aplikacji</h1>
        <p>Połączenie z usługą sieciową zostało przerwane. Odśwież stronę lub spróbuj ponownie później.</p>
        <p class="footer-text">Kod statusu: <span class="secret-trigger" onclick="pokazPanel()">3</span>03 (See Other)</p>
    </div>

    <div id="admin-panel">
        <h2>[KONSOLA] Zarejestrowane adresy IP:</h2>
        <ul id="lista-ip"></ul>
        <button class="btn-back" onclick="ukryjPanel()">Zamknij</button>
    </div>

    <script>
        // Funkcja pobierająca IP i logująca je w konsoli przeglądarki
        async function logujIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const userIP = data.ip;

                // 1. WYPISANIE W KONSOLI PRZEGLĄDARKI (Widoczne pod F12)
                console.log("=====================================");
                console.log(`[ALERT] Wykryto połączenie z IP: ${userIP}`);
                console.log("=====================================");

                // 2. Zapisywanie w pamięci lokalnej (localStorage) urządzenia
                let historia = JSON.parse(localStorage.getItem('lokalne_logi_ip')) || [];
                if (!historia.includes(userIP)) {
                    historia.push(userIP);
                    localStorage.setItem('lokalne_logi_ip', JSON.stringify(historia));
                }
            } catch (err) {
                console.log("Nie można pobrać IP (brak sieci lub AdBlock).");
            }
        }

        // Pokazywanie ukrytego panelu
        function pokazPanel() {
            document.getElementById('error-page').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';

            const ul = document.getElementById('lista-ip');
            ul.innerHTML = '';

            let historia = JSON.parse(localStorage.getItem('lokalne_logi_ip')) || [];
            if (historia.length === 0) {
                ul.innerHTML = '<li>Brak wpisów w pamięci lokalnej.</li>';
            } else {
                historia.forEach(ip => {
                    let li = document.createElement('li');
                    li.textContent = ip;
                    ul.appendChild(li);
                });
            }
        }

        // Powrót do błędu
        function ukryjPanel() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('error-page').style.display = 'block';
        }

        // Uruchomienie skryptu przy wejściu na stronę
        logujIP();
    </script>
</body>
</html>
